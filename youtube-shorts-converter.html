<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#dc2626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="YTConv">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>YouTube Shorts → 通常リンク 変換</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #dc2626;
      --line: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f9fafb, #eef2ff);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
    }
    h1 { font-size: 1.2rem; margin: 0 0 8px; }
    p { margin: 0 0 14px; color: var(--muted); font-size: .95rem; }
    textarea {
      width: 100%;
      min-height: 150px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
      background: #fff;
    }
    .row {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 9px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary { background: #374151; }
    button[hidden] { display: none; }
    .note {
      margin-top: 10px;
      font-size: .86rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>YouTube Shorts → 通常リンク 変換</h1>
    <p>Shorts / Live URL（<code>/shorts/...</code>, <code>/live/...</code>）を <code>/watch?v=...</code> 形式に変換します。複数行OK。</p>

    <label for="input">入力</label>
    <textarea id="input" placeholder="例: https://www.youtube.com/shorts/VIDEO_ID?feature=share"></textarea>

    <div class="row">
      <button id="convertBtn" type="button">変換</button>
      <button id="copyBtn" class="secondary" type="button">結果をコピー</button>
      <button id="installBtn" class="secondary" type="button" hidden>アプリをインストール</button>
    </div>

    <label for="output">出力</label>
    <textarea id="output" readonly></textarea>

    <p class="note">
      補足: アプリのバックグラウンド再生可否は、YouTubeアプリ仕様やアカウント状態（Premium等）に依存します。
    </p>
  </main>

  <script>
    function toWatchUrl(raw) {
      const trimmed = raw.trim();
      if (!trimmed) return "";

      let u;
      try {
        u = new URL(trimmed);
      } catch {
        return raw;
      }

      const host = u.hostname.replace(/^www\./, "");
      if (host === "youtube.com" || host === "m.youtube.com") {
        if (u.pathname.startsWith("/shorts/") || u.pathname.startsWith("/live/")) {
          const videoId = u.pathname.split("/")[2];
          if (!videoId) return raw;
          const watch = new URL("https://www.youtube.com/watch");
          watch.searchParams.set("v", videoId);
          const t = u.searchParams.get("t");
          if (t) watch.searchParams.set("t", t);
          return watch.toString();
        }
      }
      return raw;
    }

    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const convertBtn = document.getElementById("convertBtn");
    const copyBtn = document.getElementById("copyBtn");
    const installBtn = document.getElementById("installBtn");

    convertBtn.addEventListener("click", () => {
      const lines = input.value.split(/\r?\n/);
      const converted = lines.map(toWatchUrl).join("\n");
      output.value = converted;
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        copyBtn.textContent = "コピーしました";
        setTimeout(() => { copyBtn.textContent = "結果をコピー"; }, 1200);
      } catch {
        copyBtn.textContent = "コピー失敗";
        setTimeout(() => { copyBtn.textContent = "結果をコピー"; }, 1200);
      }
    });

    let deferredPrompt = null;
    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.hidden = false;
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
